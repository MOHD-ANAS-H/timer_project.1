<!DOCTYPE html>
<html>
<head>
    <title>Linked Timer Slots</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #1e3d8f; /* Blue background */
            color: white;
        }
        .frame {
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #ffffff;
            border-radius: 15px;
            display: inline-block;
            padding: 30px;
            box-shadow: 0 0 20px #000;
        }
        input, select, button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }
        button {
            background-color: #00c3ff;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #0099cc;
        }
        h2 {
            margin-top: 20px;
        }
        #timerSlot, #totalSlot {
            font-size: 28px;
            font-weight: bold;
            color: #00ffcc;
        }
    </style>
</head>
<body>
    <div class="frame">
        <h1>⏱ Linked Timer Project</h1>
        <form id="timerForm">
            <input type="number" id="duration" placeholder="Enter value" required>
            <select id="unit">
                <option value="seconds">Seconds</option>
                <option value="minutes">Minutes</option>
                <option value="hours">Hours</option>
            </select>
            <button type="submit">Start Timer</button>
        </form>

        <h2>Timer Slot: <span id="timerSlot">--</span></h2>
        <h2>Total Timer Slot: <span id="totalSlot">0 min</span></h2>
    </div>

    <script>
        let totalTimer = 0; // stored in seconds
        let countdown;

        document.getElementById("timerForm").onsubmit = function(e) {
            e.preventDefault();
            let value = parseInt(document.getElementById("duration").value);
            let unit = document.getElementById("unit").value;

            // Convert input to seconds
            let duration = 0;
            if (unit === "seconds") duration = value;
            if (unit === "minutes") duration = value * 60;
            if (unit === "hours") duration = value * 3600;

            totalTimer += duration; // add to total
            let totalMinutes = (totalTimer / 60).toFixed(2); // convert to minutes
            document.getElementById("totalSlot").innerText = totalMinutes + " min";

            let remaining = duration;
            updateTimerDisplay(remaining);

            clearInterval(countdown);
            countdown = setInterval(() => {
                remaining--;
                updateTimerDisplay(remaining);
                if (remaining <= 0) {
                    clearInterval(countdown);
                    document.getElementById("timerSlot").innerText = "Finished!";
                }
            }, 1000);
        }

        function updateTimerDisplay(seconds) {
            let mins = Math.floor(seconds / 60);
            let secs = seconds % 60;
            document.getElementById("timerSlot").innerText = 
                mins + "m " + secs + "s";
        }
    </script>
</body>
</html>
